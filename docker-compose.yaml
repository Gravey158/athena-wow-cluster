services:
  database-ac:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password # Inits default password for the root user
    volumes:
      - type: volume
        source: database_ac
        target: /var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=password --execute \"SHOW DATABASES;\""
      interval: 5s
      timeout: 10s
      retries: 40
    profiles:
      - ac
      - setup-ac

  database-ac-import:
    build:
      context: .
      dockerfile: game-server/azerothcore/Dockerfile
      target: db-import
    environment:
      AC_LOGIN_DATABASE_INFO: "${AUTH_DB_HOST};${AUTH_DB_PORT};${AUTH_DB_USER};${AUTH_DB_PASS};${AUTH_DB_NAME}"
      AC_WORLD_DATABASE_INFO: "${WORLD_DB_HOST};${WORLD_DB_PORT};${WORLD_DB_USER};${WORLD_DB_PASS};${WORLD_DB_NAME}"
      AC_CHARACTER_DATABASE_INFO: "${CHAR_DB_HOST};${CHAR_DB_PORT};${CHAR_DB_USER};${CHAR_DB_PASS};${CHAR_DB_NAME}"
    depends_on:
      database-ac:
        condition: service_healthy
    profiles:
      - setup-ac

  download-miscs:
    image: alpine/curl:8.14.1
    volumes:
      - core_etc:/config
      - client_data:/data
    command: >
      sh -c "curl -L https://raw.githubusercontent.com/walkline/azerothcore-wotlk/cluster-mode/src/server/apps/worldserver/worldserver.conf.dist -o /config/worldserver.conf &&
      mkdir -p /data && cd /data &&
      curl -L -o data.zip https://github.com/wowgaming/client-data/releases/download/v19/data.zip &&
      unzip -q data.zip &&
      rm -f data.zip"
    profiles:
      - setup-ac
  
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8333:8333"
      - "8085:8085"
      - "8900:8900"
      - "4000:4000"
    depends_on:
      servers-registry:
        condition: service_started
      database-ac:
        condition: service_healthy
    environment:
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
      CHAR_SERVICE_ADDRESS: charserver:8087
      CHAT_SERVICE_ADDRESS: chatserver:8992
      GUILDS_SERVICE_ADDRESS: guildserver:8995
      MAIL_SERVICE_ADDRESS: mailserver:8997
      GROUP_SERVICE_ADDRESS: groupserver:8998
      MATCHMAKING_SERVICE_ADDRESS: matchmakingserver:8994
      AUTH_DB_CONNECTION: ${AUTH_DB_USER}:${AUTH_DB_PASS}@tcp(${AUTH_DB_HOST}:${AUTH_DB_PORT})/${AUTH_DB_NAME}
      DB_SCHEMA_TYPE: ${DATABASE_SCHEMA_TYPE}
      PREFERRED_HOSTNAME: ${EXTERNAL_ADDRESS}
      LOG_LEVEL: 0
      PORT: 8085
      NATS_URL: nats://nats:4222
    profiles:
      - ac
      - tc

  gateway-second:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8045:8045"
    depends_on:
      servers-registry:
        condition: service_started
      database-ac:
        condition: service_healthy
    environment:
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
      CHAR_SERVICE_ADDRESS: charserver:8087
      CHAT_SERVICE_ADDRESS: chatserver:8992
      GUILDS_SERVICE_ADDRESS: guildserver:8995
      MAIL_SERVICE_ADDRESS: mailserver:8997
      GROUP_SERVICE_ADDRESS: groupserver:8998
      MATCHMAKING_SERVICE_ADDRESS: matchmakingserver:8994
      AUTH_DB_CONNECTION: ${AUTH_DB_USER}:${AUTH_DB_PASS}@tcp(${AUTH_DB_HOST}:${AUTH_DB_PORT})/${AUTH_DB_NAME}
      DB_SCHEMA_TYPE: ${DATABASE_SCHEMA_TYPE}
      PREFERRED_HOSTNAME: ${EXTERNAL_ADDRESS}
      LOG_LEVEL: 0
      PORT: 8045
      NATS_URL: nats://nats:4222
    profiles:
      - ac
      - tc

  servers-registry:
    build:
      context: .
      dockerfile: apps/servers-registry/Dockerfile
    ports:
      - "8999:8999"
    depends_on:
      redis:
        condition: service_started
    environment:
      PORT: 8999
      REDIS_URL: redis://:@redis:6379/0
    profiles:
      - ac
      - tc

  authserver:
    build:
      context: .
      dockerfile: apps/authserver/Dockerfile
    depends_on:
      database-ac:
        condition: service_healthy
    ports:
      - "3724:3724"
    environment:
      PORT: 3724
      AUTH_DB_CONNECTION: ${AUTH_DB_USER}:${AUTH_DB_PASS}@tcp(${AUTH_DB_HOST}:${AUTH_DB_PORT})/${AUTH_DB_NAME}
      DB_SCHEMA_TYPE: ${DATABASE_SCHEMA_TYPE}
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
    profiles:
      - ac
      - tc

  charserver:
    build:
      context: .
      dockerfile: apps/charserver/Dockerfile
    depends_on:
      servers-registry:
        condition: service_started
      database-ac:
        condition: service_healthy
    ports:
      - "8087:8087"
    environment:
      PORT: 8087
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      WORLD_DB_CONNECTION: ${WORLD_DB_USER}:${WORLD_DB_PASS}@tcp(${WORLD_DB_HOST}:${WORLD_DB_PORT})/${WORLD_DB_NAME}
    profiles:
      - ac
      - tc

  chatserver:
    build:
      context: .
      dockerfile: apps/chatserver/Dockerfile
    depends_on:
      nats:
        condition: service_started
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      NATS_URL: nats://nats:4222
      PORT: 8992
    profiles:
      - ac
      - tc

  guildserver:
    build:
      context: .
      dockerfile: apps/guildserver/Dockerfile
    depends_on:
      nats:
        condition: service_started
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      NATS_URL: nats://nats:4222
      PORT: 8995
    profiles:
      - ac
      - tc

  guidserver:
    build:
      context: .
      dockerfile: apps/guidserver/Dockerfile
    depends_on:
      redis:
        condition: service_started
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      REDIS_URL: redis://:@redis:6379/0
      PORT: 8996
    ports:
      - '8996:8996'
    profiles:
      - ac
      - tc

  mailserver:
    build:
      context: .
      dockerfile: apps/mailserver/Dockerfile
    depends_on:
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      NATS_URL: nats://nats:4222
      PORT: 8997
    ports:
      - '8997:8997'
    profiles:
      - ac
      - tc

  groupserver:
    build:
      context: .
      dockerfile: apps/groupserver/Dockerfile
    depends_on:
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      NATS_URL: nats://nats:4222
      PORT: 8998
    ports:
      - '8998:8998'
    profiles:
      - ac
      - tc

  matchmakingserver:
    build:
      context: .
      dockerfile: apps/matchmakingserver/Dockerfile
    depends_on:
      database-ac:
        condition: service_healthy
    environment:
      CHAR_DB_CONNECTION: 1:${CHAR_DB_USER}:${CHAR_DB_PASS}@tcp(${CHAR_DB_HOST}:${CHAR_DB_PORT})/${CHAR_DB_NAME}
      WORLD_DB_CONNECTION: ${WORLD_DB_USER}:${WORLD_DB_PASS}@tcp(${WORLD_DB_HOST}:${WORLD_DB_PORT})/${WORLD_DB_NAME}
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
      BATTLE_GROUPS: 1:1
      NATS_URL: nats://nats:4222
      PORT: 8994
    ports:
      - '8994:8994'
    profiles:
      - ac
      - tc

  gameserver_tc:
    build:
      context: .
      dockerfile: game-server/trinitycore/Dockerfile
    volumes:
      - core_etc:/repo/bin/etc
      - client_data:/data
    environment:
      TC_LOGIN_DATABASE_INFO: ${AUTH_DB_HOST};${AUTH_DB_PORT};${AUTH_DB_USER};${AUTH_DB_PASS};${AUTH_DB_NAME}
      TC_WORLD_DATABASE_INFO: ${WORLD_DB_HOST};${WORLD_DB_PORT};${WORLD_DB_USER};${WORLD_DB_PASS};${WORLD_DB_NAME}
      TC_CHARACTER_DATABASE_INFO: ${CHAR_DB_HOST};${CHAR_DB_PORT};${CHAR_DB_USER};${CHAR_DB_PASS};${CHAR_DB_NAME}
      TC_CONSOLE_ENABLE: 0
      TC_RA_ENABLE: 0
      TC_SOAP_ENABLE: 0
      TC_DATA_DIR: /data
      CHARACTER_GUIDS_BUFFER_SIZE: 5
      ITEM_GUIDS_BUFFER_SIZE: 50
      NATS_URL: nats://nats:4222
      GRPC_PORT: 9509
      GUID_PROVIDER_SERVICE_ADDRESS: guidserver:8996
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
    profiles:
      - tc

  gameserver-ac:
    build:
      context: .
      dockerfile: game-server/azerothcore/Dockerfile
      target: gameserver
    depends_on:
      database-ac:
        condition: service_healthy
    volumes:
      - core_etc:/repo/bin/etc
      - client_data:/data
    environment:
      AC_LOGIN_DATABASE_INFO: ${AUTH_DB_HOST};${AUTH_DB_PORT};${AUTH_DB_USER};${AUTH_DB_PASS};${AUTH_DB_NAME}
      AC_WORLD_DATABASE_INFO: ${WORLD_DB_HOST};${WORLD_DB_PORT};${WORLD_DB_USER};${WORLD_DB_PASS};${WORLD_DB_NAME}
      AC_CHARACTER_DATABASE_INFO: ${CHAR_DB_HOST};${CHAR_DB_PORT};${CHAR_DB_USER};${CHAR_DB_PASS};${CHAR_DB_NAME}
      AC_CONSOLE_ENABLE: 0
      AC_RA_ENABLE: 0
      AC_SOAP_ENABLE: 0
      AC_DATA_DIR: /data
      AC_CLUSTER_ENABLED: 1
      # Topology split (foundation for ADR-004 4-pod design): ac-1 hosts
      # classic-era continent maps (Eastern Kingdoms, Kalimdor) plus all
      # pre-BC instances/raids/BGs (map IDs < 530). ac-2 hosts Outland +
      # Northrend + BC+WotLK content (map IDs >= 530). Empty string =
      # "any map" -- explicitly enumerate to make the registry's assignment
      # deterministic and to make blast radius of one pod bounded to
      # one map era.
      AC_CLUSTER_AVAILABLE_MAPS: "0,1,30,33,34,36,37,43,47,48,70,90,109,129,189,209,229,230,249,269,289,309,329,349,369,389,409,429,449,450,451,469,489,509,529"
      CHARACTER_GUIDS_BUFFER_SIZE: 5
      ITEM_GUIDS_BUFFER_SIZE: 50
      NATS_URL: nats://nats:4222
      GRPC_PORT: 9509
      GUID_PROVIDER_SERVICE_ADDRESS: guidserver:8996
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
      MATCHMAKING_SERVICE_ADDRESS: matchmakingserver:8994
    profiles:
      - ac

  gameserver-ac-2:
    image: wow-local-gameserver-ac:latest
    depends_on:
      database-ac:
        condition: service_healthy
      gameserver-ac:
        condition: service_started
    volumes:
      - core_etc:/repo/bin/etc
      - client_data:/data
    environment:
      AC_LOGIN_DATABASE_INFO: ${AUTH_DB_HOST};${AUTH_DB_PORT};${AUTH_DB_USER};${AUTH_DB_PASS};${AUTH_DB_NAME}
      AC_WORLD_DATABASE_INFO: ${WORLD_DB_HOST};${WORLD_DB_PORT};${WORLD_DB_USER};${WORLD_DB_PASS};${WORLD_DB_NAME}
      AC_CHARACTER_DATABASE_INFO: ${CHAR_DB_HOST};${CHAR_DB_PORT};${CHAR_DB_USER};${CHAR_DB_PASS};${CHAR_DB_NAME}
      AC_CONSOLE_ENABLE: 0
      AC_RA_ENABLE: 0
      AC_SOAP_ENABLE: 0
      AC_DATA_DIR: /data
      AC_CLUSTER_ENABLED: 1
      # See gameserver-ac comment: ac-2 takes Outland (530), Northrend (571),
      # and all BC/WotLK content (>=530 except Eastern Kingdom BGs).
      AC_CLUSTER_AVAILABLE_MAPS: "530,531,532,533,534,540,542,543,544,545,546,547,548,550,552,553,554,555,556,557,558,559,560,562,564,565,566,568,571,572,574,575,576,578,580,582,584,585,586,587,588,589,590,591,593,594,595,599,600,601,602,603,604,607,608,609,610,612,613,614,615,616,617,618,619,620,621,622,623,624,628,631,632,641,642,647,649,650,658,668,672,673,712,713,724"
      CHARACTER_GUIDS_BUFFER_SIZE: 5
      ITEM_GUIDS_BUFFER_SIZE: 50
      NATS_URL: nats://nats:4222
      GRPC_PORT: 9509
      GUID_PROVIDER_SERVICE_ADDRESS: guidserver:8996
      SERVERS_REGISTRY_SERVICE_ADDRESS: servers-registry:8999
      MATCHMAKING_SERVICE_ADDRESS: matchmakingserver:8994
    profiles:
      - ac

  nats:
    image: nats:2.10-alpine
#    expose:
#      - "4222"
#    ports:
#      - "4222:4222"
#      - "8222:8222"
    hostname: nats-server
    profiles:
      - ac
      - tc

  redis:
    image: redis:7.2-alpine
#    ports:
#      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - ./cache:/data
    profiles:
      - ac
      - tc

volumes:
  database_ac:
  client_data:
  core_etc: