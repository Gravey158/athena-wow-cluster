apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: wow-galera
  namespace: wow-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  image: mariadb:11.4
  rootPasswordSecretKeyRef:
    name: mariadb-root
    key: password
    generate: false

  replicas: 3

  storage:
    size: 20Gi
    storageClassName: longhorn-nvme

  galera:
    enabled: true
    sst: mariabackup
    # primary election, replicaThreads, recovery -- use operator defaults.
    # The 'primary' / 'recovery' / 'config' fields had schema changes between
    # mariadb-operator versions; sticking with defaults keeps us compatible
    # with future upgrades.

  myCnfConfigMapKeyRef:
    name: wow-galera-my-cnf
    key: my.cnf

  podDisruptionBudget:
    maxUnavailable: 1

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi

  # Service for application connections (load-balances across galera replicas).
  service:
    type: ClusterIP
  # Primary service points at the writer-elected pod -- AC needs single-writer.
  primaryService:
    type: ClusterIP
