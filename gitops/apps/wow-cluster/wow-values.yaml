# Helm values overlay for athena-wow-cluster -- 'wow' release in ns wow-cluster.
#
# Image tag: upstream walkline v0.0.4 for now. Switch to our AC-fork image
# (ghcr.io/gravey158/athena-wow-core) for gameserver_ac once Phase 0.2 builds it.

tc9ImagesTag: &defaultImagesTag "v0.0.4"

# Subcharts.
redis:
  # Disabled: Bitnami changed image-hosting policy in 2025, the chart-pinned
  # docker.io/bitnami/redis:7.2.3-debian-11-r1 tag is gone. Re-enable once we
  # either pin a newer chart version or switch to an official redis image
  # (chart modification needed). Most ToCloud9 services tolerate redis being
  # absent for the smoke-test phase; revisit if any service hard-depends on it.
  enabled: false
nats:
  enabled: true
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
mysql:
  enabled: false   # external Galera in this ns via mariadb-operator

databases:
  externalSecret: true   # hardfork addition; see ADR 003
  external_db_hostname: "wow-galera-primary.wow-cluster.svc.cluster.local"
  external_db_port: "3306"
  db_schema_type: ac
  db_user: acore
  db_auth_name: acore_auth
  db_characters_name: acore_characters
  db_world_name: acore_world
  # db_password is ignored when externalSecret=true. The Secret
  # 'wow-databases-config' (sealed) provides connection strings directly.

# Global resources block consumed by all service templates (chart quirk -- one
# .Values.resources block, no per-service tuning yet).
#
# Sized for cluster capacity: 3 workers x 4 CPU = 12 CPU total, shared with
# every other Athena workload. With ~12 ToCloud9 pods + 3 NATS + 3 Galera,
# we keep CPU requests low so all pods fit. gameserver_ac specifically can
# burst to limit when needed. Revisit in Phase 4 perf when we have profiling.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 2Gi

# External exposure handled by our own LoadBalancer services in
# gitops/apps/wow-cluster/external-services.yaml (MetalLB-pinned .72/.73).
authserver:
  replicaCount: 1
  service:
    type: ClusterIP
    internalPort: 3724
    externalPort: 32767   # unused at type=ClusterIP

gateway:
  replicaCount: 2
  hostname: "10.10.30.73"   # advertised to clients in realmlist redirect
  port: 32766
  service:
    type: ClusterIP

gameserver_ac:
  replicaCount: 2
  storageClass: longhorn-static   # RWX-capable
  port_world: 9601
  port_health: 9604
  port_soap: 7878
  port_telnet: 3443
  initcontainer:
    download_enabled: true
    download_url: "https://github.com/wowgaming/client-data/releases/download/v16/data.zip"
    image:
      repository: alpine
      pullPolicy: IfNotPresent
      tag: "latest"
  service:
    type: ClusterIP
    internalPort: 9509
    externalPort: 9509
