apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set-controller
    targetRevision: "0.14.1"
    helm:
      releaseName: arc
      values: |
        # ARC controller — namespace-scoped management of AutoscalingRunnerSets.
        # Runs in arc-systems, watches AutoscalingRunnerSet CRDs cluster-wide.
        fullnameOverride: arc
        replicaCount: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 256Mi
        # Reduce log noise once stable.
        logLevel: info
        logFormat: text
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
